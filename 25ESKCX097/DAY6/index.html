<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container"></div>
    <script>
        fetch("https://jsonplaceholder.typicode.com/users")
        .then(res=>res.json())
        // res.jon convert data is javascript object but this action needs some time so return a promise
        // data me actual object bnta h 
        // backtick is use to make template literals
        .then(data=>{
            let output="";
            data.map(user=>{
                output+=`
                
                <div class="card">
                    <h2>${user.name}</h2>
                    <p>${user.email}</p>
                    </div>
                    `;
            });
            document.getElementById("container").innerHTML=output;
        }
            
        );
    </script>
</body>
</html>
